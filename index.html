<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Feedback Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  justify-content: space-between;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* BUTTON */
button {
  background: #3b82f6;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
button:hover { background: #2563eb; }

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

/* LOADING MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
}

/* STATUS */
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.green { background:#16a34a; }
.red { background:#dc2626; }

/* PROGRESS BAR */
.progress {
  width: 200px;
  height: 10px;
  background: #334155;
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: 0.3s;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let cookies = [];
let tasks = [];

function renderLogin() {
  app.innerHTML = `
  <div class="login">
    <div class="login-box">
      <h2>Login</h2>
      <input id="acc" placeholder="No HP">
      <input id="pass" type="password" placeholder="Password">
      <button id="btnLogin" onclick="login()">Login</button>
    </div>
  </div>`;
}

function showLoading(text="Loading...") {
  const div = document.createElement("div");
  div.className = "modal";
  div.id = "loading";
  div.innerHTML = `
    <div>${text}</div>
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  `;
  document.body.appendChild(div);
}

function updateProgress(percent){
  const bar = document.getElementById("progressBar");
  if(bar) bar.style.width = percent + "%";
}

function hideLoading() {
  document.getElementById("loading")?.remove();
}

// =====================
// LOGIN (FIXED)
// =====================
async function login() {
  btnLogin.disabled = true;
  showLoading("Login...");

  try {
    const res = await fetch(API + "/api/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        account: acc.value,
        password: pass.value
      })
    });

    const json = await res.json();
    console.log("LOGIN:", json);

    if (!json.success) {
      hideLoading();
      btnLogin.disabled = false;
      alert("❌ Login gagal:\n" + JSON.stringify(json.error));
      return;
    }

    cookies = json.cookies;

    hideLoading();
    renderDashboard();

    loadTasks();

  } catch (err) {
    hideLoading();
    btnLogin.disabled = false;
    alert("❌ Error: " + err.message);
  }
}

// =====================
// DASHBOARD
// =====================
function renderDashboard() {
  app.innerHTML = `
    <div class="header">
      <div>Total: <span id="total">0</span></div>
      <button onclick="autoAll()">Auto Feedback ALL</button>
    </div>

    <div id="list" class="grid"></div>
  `;

  const list = document.getElementById("list");
  list.innerHTML = Array(6).fill().map(()=>`<div class="card">Loading...</div>`).join("");
}

// =====================
// LOAD TASKS
// =====================
async function loadTasks() {
  showLoading("Ambil data...");

  try {
    await fetch(API + "/api/tasks", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ cookies })
    });

    const res = await fetch(API + "/api/tasks/result");
    const json = await res.json();

    tasks = json.data || [];
    document.getElementById("total").innerText = json.total;

    renderList();

  } catch (err) {
    alert("❌ Gagal ambil data");
  }

  hideLoading();
}

// =====================
// RENDER LIST
// =====================
function renderList() {
  const list = document.getElementById("list");

  list.innerHTML = tasks.map(t => `
    <div class="card">
      <b>${t.userName}</b><br>
      ${t.phoneNumber}<br><br>

      💰 ${t.formatDebt}<br>
      📍 ${t.addressBo?.city}<br><br>

      <span class="badge ${t.feedbackStatus==='SUDAH'?'green':'red'}">
        ${t.feedbackStatus}
      </span>

      <br><br>
      <button onclick="autoOne('${t.id}')">Auto Feedback</button>
    </div>
  `).join("");
}

// =====================
// AUTO ONE
// =====================
async function autoOne(id) {
  await fetch(API + "/api/feedback", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ cookies, taskId:id })
  });

  alert("Done 1");
}

// =====================
// AUTO ALL (WITH PROGRESS)
// =====================
async function autoAll() {
  const total = tasks.length;
  let done = 0;

  showLoading("Auto feedback berjalan...");

  for (let t of tasks) {
    await fetch(API + "/api/auto", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ cookies, taskId:t.id })
    });

    done++;
    updateProgress((done/total)*100);
  }

  hideLoading();
  alert("🔥 Semua selesai");
}

renderLogin();
</script>

</body>
</html>
