<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>🚀 Auto Feedback</h2>

  <!-- LOGIN -->
  <div id="loginBox">
    <input id="account" placeholder="No HP">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    <button onclick="startAuto()">🔥 Auto Feedback</button>
    <button onclick="refresh()">🔄 Refresh</button>

    <h3 id="summary"></h3>

    <div id="list"></div>
    <div id="loading">Loading...</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
