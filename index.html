<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🔐 Login</h2>
<div class="card">
  <input id="account" placeholder="Account">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<h2>📋 Dashboard</h2>
<div class="card">
  <button onclick="loadTasks()">Load Tasks</button>
  <button onclick="runAuto()">Run Auto</button>

  <p id="summary"></p>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>DPD</th>
        <th>Debt</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="taskTable"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
