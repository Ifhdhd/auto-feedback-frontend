<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APP</title>

<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:10px}
img{width:100%;border-radius:10px}
button{padding:10px;margin-top:10px;width:100%}
input{width:100%;padding:10px;margin:5px 0}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API="https://auto-feedback-backend.onrender.com";

function loginView(){
app.innerHTML=`
<input id="acc" placeholder="No HP">
<input id="pass" type="password">
<button onclick="login()">Login</button>
`;
}

async function login(){
app.innerHTML="login...";

try{
const res=await fetch(API+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
account:acc.value,
password:pass.value
})
});

const j=await res.json();

if(!j.success){
alert(j.error);
return loginView();
}

localStorage.setItem("userId",j.userId);

load();

}catch{
alert("Failed to fetch (cek CORS / URL)");
loginView();
}
}

async function load(){
app.innerHTML="ambil data...";

const res=await fetch(API+"/api/tasks",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userId:localStorage.getItem("userId")
})
});

const j=await res.json();

if(!j.success){
alert(j.error);
return;
}

render(j.data);
}

function render(data){
app.innerHTML = data.map(t=>`
<div class="card">
<b>${t.userName}</b><br>
${t.phone}<br>
Expire: ${t.expire} hari<br><br>
<img src="${t.photo || ''}">
</div>
`).join("");
}

loginView();
</script>

</body>
</html>
