<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Feedback</title>
</head>

<body>
<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

function renderLogin(){
  app.innerHTML = `
    <h2>Login</h2>
    <input id="acc" placeholder="No HP"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  `;
}

async function login(){
  const res = await fetch(API + "/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      account: acc.value,
      password: pass.value
    })
  });

  const json = await res.json();

  if(!json.success){
    alert("Login gagal");
    return;
  }

  localStorage.setItem("userId", json.userId);

  loadTasks();
}

async function loadTasks(){
  const res = await fetch(API + "/api/tasks", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      userId: localStorage.getItem("userId")
    })
  });

  const json = await res.json();

  if(!json.success){
    alert(json.error);
    return;
  }

  app.innerHTML = `
    <h3>Total: ${json.total}</h3>
    <button onclick="autoAll()">Auto All</button>
    <div>
      ${json.data.map(t=>`
        <div>
          ${t.userName} - ${t.phoneNumber}
        </div>
      `).join("")}
    </div>
  `;
}

async function autoAll(){
  await fetch(API + "/api/auto", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      userId: localStorage.getItem("userId")
    })
  });

  alert("Selesai");
}

renderLogin();
</script>
</body>
</html>
