<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEWA Dashboard</title>

<style>
body { background:#0f172a; color:white; font-family:sans-serif }
.card { background:#1e293b; padding:10px; margin:10px; border-radius:10px }
img { width:100%; border-radius:10px }
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let userId;
let tasks=[];

function loginUI(){
  app.innerHTML=`
    <input id="acc"><br>
    <input id="pass" type="password"><br>
    <button onclick="login()">Login</button>
  `;
}

async function login(){
  app.innerHTML="🔄 login...";

  const res=await fetch(API+"/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      account:acc.value,
      password:pass.value
    })
  });

  const j=await res.json();

  userId=j.userId;

  loadTasks();
}

async function loadTasks(){
  app.innerHTML="📥 ambil data...";

  await fetch(API+"/api/tasks",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  const int=setInterval(async ()=>{
    const p=await fetch(API+"/api/progress?userId="+userId);
    const prog=await p.json();

    app.innerHTML=`⏳ ${prog.done}/${prog.total}`;

    if(prog.done===prog.total && prog.total>0){
      clearInterval(int);

      const r=await fetch(API+"/api/tasks/result?userId="+userId);
      const j=await r.json();

      tasks=j.data;
      render();
    }

  },1000);
}

function render(){
  app.innerHTML=`
    <h2>Total ${tasks.length}</h2>
    <button onclick="auto()">AUTO</button>

    ${tasks.map(t=>`
      <div class="card">
        <img src="${t.photo||''}">
        <b>${t.userName}</b><br>
        Sisa: ${t.sisaHari} hari
      </div>
    `).join("")}
  `;
}

async function auto(){
  await fetch(API+"/api/auto",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  alert("🔥 done");
}

loginUI();
</script>

</body>
</html>
