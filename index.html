<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:10px}
img{width:100%;border-radius:10px}
button{padding:8px;margin-top:10px}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

function loginView(){
app.innerHTML=`
<input id="acc" placeholder="No HP"><br>
<input id="pass" type="password"><br>
<button onclick="login()">Login</button>
`;
}

async function login(){
const res=await fetch(API+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
account:acc.value,
password:pass.value
})
});

const j=await res.json();

if(!j.success) return alert("login gagal");

localStorage.setItem("userId",j.userId);

load();
}

async function load(){
app.innerHTML="loading...";

const res=await fetch(API+"/api/tasks",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userId:localStorage.getItem("userId")
})
});

const j=await res.json();

if(!j.success) return alert(j.error);

render(j.data);
}

function render(data){
app.innerHTML=data.map(t=>`
<div class="card">
<b>${t.userName}</b><br>
${t.phoneNumber}<br>
Expire: ${t.expire} hari<br><br>
<img src="${t.photo || ''}">
</div>
`).join("");
}

loginView();
</script>

</body>
</html>
