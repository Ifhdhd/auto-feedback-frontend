<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    input {
      width: 250px;
    }

    button {
      background: linear-gradient(45deg,#22c55e,#16a34a);
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      background: #1e293b;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }

    td, th {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #020617;
    }

    .loading {
      position: fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction: column;
      font-size: 20px;
    }

    .hidden { display:none; }

    .success { color:#22c55e }
    .fail { color:#ef4444 }
  </style>
</head>

<body>

<h2>🔥 Auto Feedback System</h2>

<input id="account" placeholder="No HP">
<input id="password" placeholder="Password" type="password">

<br>

<button onclick="login()">Login</button>
<button onclick="autoFeedback()">Auto Feedback All</button>

<table id="table"></table>

<div id="loading" class="loading hidden">
  <h2 id="loadingText">Loading...</h2>
</div>

<script>
function showLoading(text){
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("loadingText").innerText = text;
}

function hideLoading(){
  document.getElementById("loading").classList.add("hidden");
}

// =====================
// LOGIN + LOAD TASK
// =====================
async function login(){
  const account = document.getElementById("account").value;
  const password = document.getElementById("password").value;

  showLoading("🔐 Login...");

  const loginRes = await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ account, password })
  });

  const loginData = await loginRes.json();

  if(!loginData.success){
    hideLoading();
    alert("Login gagal");
    return;
  }

  showLoading("📦 Memuat semua data...");

  const res = await fetch("/api/tasks");
  const data = await res.json();

  hideLoading();

  render(data.data);
}

// =====================
// AUTO FEEDBACK (FIX)
// =====================
async function autoFeedback(){
  showLoading("🚀 Auto feedback berjalan...");

  const res = await fetch("/api/auto",{
    method:"POST"
  });

  const data = await res.json();

  hideLoading();

  alert(`Selesai\n✅ Success: ${data.successCount}\n❌ Fail: ${data.failedCount}`);
}

// =====================
// RENDER
// =====================
function render(list){
  const table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Nama</th>
      <th>Debt</th>
      <th>Status</th>
    </tr>
  `;

  list.forEach(x=>{
    table.innerHTML += `
      <tr>
        <td>${x.userName}</td>
        <td>${x.formatDebt}</td>
        <td class="${x.feedbackStatus === 'SUCCESS' ? 'success' : 'fail'}">
          ${x.feedbackStatus}
        </td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
