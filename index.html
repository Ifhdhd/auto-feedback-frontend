<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Feedback</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let userId = null;
let tasks = [];

function loginUI() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="acc" placeholder="No HP"><br><br>
    <input id="pass" type="password"><br><br>
    <button onclick="login()">Login</button>
  `;
}

async function login() {
  app.innerHTML = "🔄 Login...";

  const res = await fetch(API + "/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      account: acc.value,
      password: pass.value
    })
  });

  const json = await res.json();

  if (!json.success) {
    return app.innerHTML = "❌ Login gagal";
  }

  userId = json.userId;

  loadTasks();
}

async function loadTasks() {
  app.innerHTML = "📥 Ambil data...";

  await fetch(API + "/api/tasks", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ userId })
  });

  const interval = setInterval(async () => {
    const res = await fetch(API + "/api/tasks/result?userId=" + userId);
    const json = await res.json();

    if (json.total > 0) {
      tasks = json.data;
      render();
      clearInterval(interval);
    }

  }, 2000);
}

function render() {
  app.innerHTML = `
    <h2>Total: ${tasks.length}</h2>
    <button onclick="auto()">Auto Feedback</button>

    ${tasks.map(t => `
      <div class="card">
        <b>${t.userName || "-"}</b><br>
        ${t.phoneNumber || "-"}
      </div>
    `).join("")}
  `;
}

async function auto() {
  await fetch(API + "/api/auto", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ userId })
  });

  alert("🔥 Selesai");
}

loginUI();
</script>

</body>
</html>
