<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Feedback PRO++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:#e2e8f0;
}

/* HEADER */
.header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  z-index:10;
}

/* CONTAINER */
.container {
  margin-top:80px;
  padding:10px;
}

/* BUTTON */
button {
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:#020617;
  padding:30px;
  border-radius:12px;
  border:1px solid #1e293b;
}
input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #1e293b;
  background:#020617;
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
}

/* CARD */
.card {
  background:#020617;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:15px;
  margin:10px;
}

/* BADGE */
.badge { padding:4px 8px; border-radius:6px; font-size:12px; }
.green { background:#16a34a; }
.red { background:#dc2626; }

/* PROGRESS */
.progress-box {
  width:100%;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin:10px 0;
}
.progress-bar {
  height:10px;
  background:#22c55e;
  width:0%;
}

/* STATS */
.stats {
  display:flex;
  gap:10px;
  margin:10px 0;
}
.stat {
  background:#020617;
  padding:10px;
  border:1px solid #1e293b;
  border-radius:10px;
}

/* SCROLL */
.list-container {
  height:65vh;
  overflow:auto;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let tasks = [];
let progress = 0;
let success = 0;
let fail = 0;
let interval;

/* ================= LOGIN ================= */
function renderLogin(){
  app.innerHTML = `
  <div class="login">
    <div class="login-box">
      <h2>Login Multi Akun</h2>
      <input id="acc" placeholder="No HP">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>`;
}

async function login(){
  const res = await fetch(API+"/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      account:acc.value,
      password:pass.value
    })
  });

  const json = await res.json();

  if(!json.success){
    alert("Login gagal");
    return;
  }

  // simpan multi akun
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  users.push({ id: json.userId, name: json.data?.data?.name });
  localStorage.setItem("users", JSON.stringify(users));

  localStorage.setItem("activeUser", json.userId);

  renderDashboard();
  loadTasks();
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const users = JSON.parse(localStorage.getItem("users") || "[]");

  app.innerHTML = `
  <div class="header">
    <div>
      <select onchange="switchUser(this.value)">
        ${users.map(u=>`<option value="${u.id}">${u.name||u.id}</option>`).join("")}
      </select>
    </div>

    <div>
      <button onclick="autoAll()">🔥 Auto ALL</button>
    </div>
  </div>

  <div class="container">

    <div>Total: <span id="total">0</span></div>

    <div class="progress-box">
      <div id="progress" class="progress-bar"></div>
    </div>

    <div class="stats">
      <div class="stat">✅ <span id="sukses">0</span></div>
      <div class="stat">❌ <span id="gagal">0</span></div>
    </div>

    <div class="list-container">
      <div id="list" class="grid"></div>
    </div>

  </div>
  `;
}

function switchUser(id){
  localStorage.setItem("activeUser", id);
  loadTasks();
}

/* ================= LOAD TASK ================= */
async function loadTasks(){
  const userId = localStorage.getItem("activeUser");

  const res = await fetch(API+"/api/tasks",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ userId })
  });

  const json = await res.json();

  if(!json.success){
    alert("Gagal ambil data");
    return;
  }

  tasks = json.data || [];
  document.getElementById("total").innerText = json.total;

  renderList();
}

/* ================= RENDER ================= */
function renderList(){
  const list = document.getElementById("list");

  list.innerHTML = tasks.map(t=>`
  <div class="card">
    <b>${t.userName}</b><br>
    ${t.phoneNumber}<br><br>

    💰 ${t.formatDebt}<br>
    📍 ${t.addressBo?.city}<br><br>

    <span class="badge ${t.feedbackStatus==='SUDAH'?'green':'red'}">
      ${t.feedbackStatus}
    </span>
  </div>
  `).join("");
}

/* ================= AUTO ================= */
async function autoAll(){
  const userId = localStorage.getItem("activeUser");

  success = 0;
  fail = 0;
  progress = 0;

  await fetch(API+"/api/auto",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ userId })
  });

  startRealtime();
}

/* ================= REALTIME ================= */
function startRealtime(){
  clearInterval(interval);

  interval = setInterval(async ()=>{
    const res = await fetch(API+"/api/tasks/result?userId="+localStorage.getItem("activeUser"));
    const json = await res.json();

    const total = json.total || 0;
    const done = json.data.filter(t=>t.feedbackStatus==="SUDAH").length;

    progress = total ? (done/total)*100 : 0;

    document.getElementById("progress").style.width = progress+"%";

    document.getElementById("sukses").innerText = done;
    document.getElementById("gagal").innerText = total - done;

    if(done === total){
      clearInterval(interval);
      alert("🔥 selesai semua");
    }

  }, 2000);
}

renderLogin();
</script>

</body>
</html>
