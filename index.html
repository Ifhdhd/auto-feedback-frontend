<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Feedback Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  justify-content: space-between;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* BUTTON */
button {
  background: #3b82f6;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
button:hover { background: #2563eb; }

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

/* LOADING */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* PROGRESS */
.progress {
  width:200px;
  height:10px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
.progress-bar {
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
}

/* BADGE */
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.green { background:#16a34a; }
.red { background:#dc2626; }
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

async function loadTasks() {

async function autoAll() {

    method:"POST",

  });

  alert("Auto jalan");
}
</script>
</body>
</html>
