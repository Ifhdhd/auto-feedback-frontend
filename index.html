<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Feedback Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🚀 Auto Feedback Dashboard</h1>

  <!-- LOGIN -->
  <div class="card">
    <h2>Login</h2>
    <input type="text" id="account" placeholder="Nomor HP">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ACTION -->
  <div class="card">
    <h2>Actions</h2>
    <button onclick="loadTasks()">Load Data</button>
    <button onclick="getResult()">Refresh</button>
  </div>

  <!-- SUMMARY -->
  <div class="card">
    <h2>Summary</h2>
    <div id="summary"></div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h2>Data</h2>
    <table id="table">
      <thead>
        <tr>
          <th>Nama</th>
          <th>DPD</th>
          <th>Debt</th>
          <th>Status</th>
          <th>Sisa Hari</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
