<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APP</title>
</head>

<body>

<div id="app"></div>

<script>
const API = "http://localhost:3000";

function loginView(){
app.innerHTML = `
<input id="acc" placeholder="no hp"><br>
<input id="pass" type="password"><br>
<button onclick="login()">login</button>
`;
}

async function login(){
const res = await fetch(API+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
account:acc.value,
password:pass.value
})
});

const j = await res.json();

if(!j.success) return alert("gagal");

localStorage.setItem("userId", j.userId);

load();
}

async function load(){
const res = await fetch(API+"/api/tasks",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userId:localStorage.getItem("userId")
})
});

const j = await res.json();

app.innerHTML = JSON.stringify(j.data,null,2);
}

loginView();
</script>

</body>
</html>
