<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Feedback App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🔥 Auto Feedback Dashboard</h1>

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="account" placeholder="Nomor HP">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    
    <div class="summary">
      <div class="box total">Total: <span id="total">0</span></div>
      <div class="box done">Done: <span id="done">0</span></div>
      <div class="box pending">Pending: <span id="pending">0</span></div>
      <div class="box expired">Expired: <span id="expired">0</span></div>
    </div>

    <div class="actions">
      <button onclick="loadTasks()">🔄 Refresh</button>
      <button onclick="runAuto()">⚡ Auto Feedback</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nama</th>
          <th>Status</th>
          <th>Sisa Hari</th>
        </tr>
      </thead>
      <tbody id="taskTable"></tbody>
    </table>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
