<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
img{width:80px;border-radius:10px}
</style>
</head>
<body>

<div id="app"></div>

<script>
const API="https://auto-feedback-backend.onrender.com";

function loginUI(){
app.innerHTML=`
<h2>Login</h2>
<input id="acc" placeholder="HP"><br>
<input id="pass" type="password"><br>
<button onclick="login()">Login</button>`;
}

async function login(){
alert("🔐 login...");
const res=await fetch(API+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({account:acc.value,password:pass.value})
});
const j=await res.json();

if(!j.success)return alert("gagal");

localStorage.setItem("userId",j.userId);

dashboard();
load();
}

function dashboard(){
app.innerHTML=`
<button onclick="logout()">Logout</button>
<button onclick="auto()">AUTO ALL</button>
<div id="list"></div>`;
}

function logout(){
localStorage.clear();
loginUI();
}

async function load(){
const id=localStorage.getItem("userId");

alert("📥 ambil data...");

const res=await fetch(API+"/api/tasks",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:id})
});

const j=await res.json();

render(j.data||[]);
}

function render(data){
list.innerHTML=data.map(t=>`
<div class="card">
<img src="${t.photo||''}">
<br>${t.userName}
<br>📞 ${t.phoneNumber}
<br>⏳ sisa ${t.sisaHari}
</div>`).join("");
}

async function auto(){
const id=localStorage.getItem("userId");
alert("⚡ running...");
await fetch(API+"/api/auto",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:id})
});
alert("selesai");
}

loginUI();
</script>
</body>
</html>
