<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      background: #1e293b;
      border-collapse: collapse;
    }

    td, th {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    .loading {
      position: fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<h2>🔥 Auto Feedback</h2>

<input id="cookieInput" placeholder="paste cookie disini" style="width:400px;">
<button onclick="login()">Login</button>
<button onclick="autoFeedback()">Auto Feedback All</button>

<table id="table"></table>

<div id="loading" class="loading hidden">
  <h2 id="loadingText">Loading...</h2>
</div>

<script>
function showLoading(text){
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("loadingText").innerText = text;
}

function hideLoading(){
  document.getElementById("loading").classList.add("hidden");
}

// =====================
// LOGIN + AUTO LOAD
// =====================
async function login(){
  const cookies = document.getElementById("cookieInput").value.split(";");

  await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({cookies})
  });

  showLoading("🔄 Memuat data...");

  const res = await fetch("/api/tasks");
  const data = await res.json();

  hideLoading();

  render(data.data);
}

// =====================
// AUTO FEEDBACK
// =====================
async function autoFeedback(){
  showLoading("🚀 Auto feedback berjalan...");

  const res = await fetch("/api/tasks/auto",{
    method:"POST"
  });

  const data = await res.json();

  hideLoading();

  alert(`Selesai\nSuccess: ${data.successCount}\nFail: ${data.failedCount}`);
}

// =====================
// RENDER TABLE
// =====================
function render(list){
  const table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Nama</th>
      <th>Debt</th>
      <th>Status</th>
    </tr>
  `;

  list.forEach(x=>{
    table.innerHTML += `
      <tr>
        <td>${x.userName}</td>
        <td>${x.formatDebt}</td>
        <td>${x.feedbackStatus}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
