<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    input, button {
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
    }

    button {
      background:#22c55e;
      color:white;
      cursor:pointer;
    }

    table {
      width:100%;
      background:#1e293b;
      border-collapse: collapse;
    }

    td, th {
      padding:10px;
      border-bottom:1px solid #334155;
    }

    .loading {
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<div class="card">
  <h2>🔥 Login</h2>
  <input id="account" placeholder="No HP">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="autoFeedback()">Auto Feedback All</button>
</div>

<table id="table"></table>

<div id="loading" class="loading hidden">
  <div id="loadingText">Loading...</div>
</div>

<script>
function showLoading(text){
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("loadingText").innerText = text;
}

function hideLoading(){
  document.getElementById("loading").classList.add("hidden");
}

// =====================
// LOGIN
// =====================
async function login(){
  const account = document.getElementById("account").value;
  const password = document.getElementById("password").value;

  showLoading("🔐 Login...");

  const res = await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ account, password })
  });

  const data = await res.json();

  if(!data.success){
    hideLoading();
    alert("Login gagal");
    return;
  }

  showLoading("📥 Memuat data...");

  const taskRes = await fetch("/api/tasks");
  const taskData = await taskRes.json();

  hideLoading();

  render(taskData.data);
}

// =====================
// AUTO FEEDBACK
// =====================
async function autoFeedback(){
  showLoading("🚀 Auto feedback berjalan...");

  const res = await fetch("/api/auto",{
    method:"POST"
  });

  const data = await res.json();

  hideLoading();

  alert(`Selesai\nSuccess: ${data.successCount}\nFail: ${data.failedCount}`);
}

// =====================
// RENDER
// =====================
function render(list){
  const table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Nama</th>
      <th>Debt</th>
    </tr>
  `;

  list.forEach(x=>{
    table.innerHTML += `
      <tr>
        <td>${x.userName}</td>
        <td>${x.formatDebt}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
