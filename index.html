<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>🔥 Auto Feedback Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:#e2e8f0;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  background:rgba(2,6,23,0.9);
  backdrop-filter: blur(10px);
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1e293b;
}

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:#020617;
  border:1px solid #334155;
  padding:30px;
  border-radius:16px;
  width:300px;
  box-shadow:0 0 40px rgba(59,130,246,0.3);
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:white;
}

/* BUTTON */
button {
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
  border:none;
  padding:10px 14px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
button:hover { opacity:0.8 }

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
}

/* CARD */
.card {
  background:#020617;
  border:1px solid #334155;
  border-radius:14px;
  padding:15px;
  margin:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* BADGE */
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.green { background:#16a34a }
.red { background:#dc2626 }

/* LOADING */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

/* PROGRESS BAR */
.progress {
  width:100%;
  height:10px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
.bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition:0.3s;
}

/* SKELETON */
.skeleton {
  height:120px;
  background: linear-gradient(90deg,#020617,#1e293b,#020617);
  animation: shimmer 1.2s infinite;
  border-radius:12px;
}
@keyframes shimmer {
  0%{background-position:-200px 0}
  100%{background-position:200px 0}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let userId = localStorage.getItem("userId");
let tasks = [];

// ================= LOGIN =================
function renderLogin(){
  app.innerHTML = `
  <div class="login">
    <div class="login-box">
      <h2>Login</h2>
      <input id="acc" placeholder="No HP">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>`;
}

async function login(){
  showLoading("Login...");
  try{
    const res = await fetch(API+"/api/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        account: acc.value,
        password: pass.value
      })
    });

    const json = await res.json();

    if(!json.success){
      alert("Login gagal: "+json.error);
      return hideLoading();
    }

    userId = json.userId;
    localStorage.setItem("userId", userId);

    renderDashboard();
    loadTasks();

  }catch(e){
    alert("ERROR: "+e.message);
  }

  hideLoading();
}

// ================= DASHBOARD =================
function renderDashboard(){
  app.innerHTML = `
    <div class="header">
      <div>Total: <span id="total">0</span></div>
      <button onclick="autoAll()">🔥 Auto All</button>
    </div>

    <div class="progress">
      <div id="bar" class="bar"></div>
    </div>

    <div id="list" class="grid"></div>
  `;

  const list = document.getElementById("list");
  list.innerHTML = Array(6).fill().map(()=>`<div class="skeleton"></div>`).join("");
}

// ================= LOAD TASK =================
async function loadTasks(){
  showLoading("Ambil data...");

  try{
    await fetch(API+"/api/tasks",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ userId })
    });

    const res = await fetch(API+`/api/tasks/result?userId=${userId}`);
    const json = await res.json();

    tasks = json.data || [];
    document.getElementById("total").innerText = json.total;

    renderList();

  }catch(e){
    alert("Gagal ambil data");
  }

  hideLoading();
}

// ================= RENDER =================
function renderList(){
  const list = document.getElementById("list");

  list.innerHTML = tasks.map(t => `
    <div class="card">
      <b>${t.userName}</b><br>
      ${t.phoneNumber}<br><br>

      💰 ${t.formatDebt}<br>
      📍 ${t.addressBo?.city}<br><br>

      <span class="badge ${t.feedbackStatus==='SUDAH'?'green':'red'}">
        ${t.feedbackStatus}
      </span>
    </div>
  `).join("");
}

// ================= AUTO ALL =================
async function autoAll(){
  showLoading("Auto berjalan...");

  let done = 0;
  const total = tasks.length;

  for(let t of tasks){
    await fetch(API+"/api/auto",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ userId })
    });

    done++;
    updateBar(done,total);
  }

  hideLoading();
  alert("Selesai 🔥");
}

function updateBar(done,total){
  const percent = Math.floor((done/total)*100);
  document.getElementById("bar").style.width = percent+"%";
}

// ================= LOADING =================
function showLoading(text){
  const div = document.createElement("div");
  div.className="modal";
  div.id="loading";
  div.innerHTML=text;
  document.body.appendChild(div);
}
function hideLoading(){
  document.getElementById("loading")?.remove();
}

// ================= INIT =================
if(userId){
  renderDashboard();
  loadTasks();
}else{
  renderLogin();
}
</script>

</body>
</html>
