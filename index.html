<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Feedback Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🚀 Auto Feedback</h2>

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input id="account" placeholder="No HP">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ACTION -->
  <div class="card">
    <button onclick="loadTasks()">📥 Load Data</button>
    <button onclick="autoFeedback()">⚡ Auto Feedback</button>
  </div>

  <!-- STATUS -->
  <div id="status"></div>

  <!-- DATA -->
  <div id="taskList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
