<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Feedback Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🚀 Auto Feedback Dashboard</h1>

  <!-- LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <input id="account" placeholder="Nomor HP">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ACTION -->
  <div class="card hidden" id="actionBox">
    <button onclick="loadTasks()">🔄 Load Tasks</button>
    <button onclick="startAuto()">🔥 Auto Feedback</button>
  </div>

  <!-- SUMMARY -->
  <div class="card hidden" id="summaryBox">
    <h3>Summary</h3>
    <div id="summary"></div>
  </div>

  <!-- TASK LIST -->
  <div class="card hidden">
    <h3>Tasks</h3>
    <div id="taskList"></div>
    <div id="loading">Loading...</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
