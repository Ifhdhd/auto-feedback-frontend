<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Feedback Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --border:rgba(255,255,255,0.06);
  --primary:#3b82f6;
  --accent:#22c55e;
  --danger:#ef4444;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617 70%);
  color: #e2e8f0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  backdrop-filter: blur(16px);
  background: rgba(2,6,23,0.7);
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* CARD */
.card {
  background: linear-gradient(160deg,#020617,#0f172a);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  transition: 0.3s;
  position: relative;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}

/* BUTTON */
button {
  background: linear-gradient(135deg,#2563eb,#1d4ed8);
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-weight: 600;
  transition: 0.25s;
}
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(37,99,235,0.5);
}

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background: rgba(15,23,42,0.8);
  backdrop-filter: blur(20px);
  padding:30px;
  border-radius:18px;
  width:320px;
  border:1px solid var(--border);
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
  outline:none;
  border:1px solid var(--border);
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PROGRESS */
.progress-box {
  width: 320px;
  text-align: center;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: #020617;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
  border:1px solid var(--border);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#22c55e,#4ade80,#22c55e);
  background-size:200%;
  animation: move 2s linear infinite;
}
@keyframes move {
  0%{background-position:0%}
  100%{background-position:200%}
}

/* GRID */
.grid {
  display:grid;
  gap:18px;
  padding:18px;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
}

/* BADGE */
.badge {
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}
.green { background:#16a34a; }
.red { background:#dc2626; }

/* SKELETON */
.skeleton {
  height:140px;
  border-radius:18px;
  background: linear-gradient(90deg,#020617,#1e293b,#020617);
  background-size:200px 100%;
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer {
  0%{background-position:-200px 0}
  100%{background-position:200px 0}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let cookies = [];
let tasks = [];

/* LOGIN UI */
function renderLogin() {
  app.innerHTML = `
  <div class="login">
    <div class="login-box">
      <h2>🔥 Auto Feedback</h2>
      <input id="acc" placeholder="No HP">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>`;
}

/* LOADING */
function showLoading(text="Loading...", progress=false) {
  const div = document.createElement("div");
  div.className = "modal";
  div.id = "loading";

  div.innerHTML = progress ? `
    <div class="progress-box">
      <div id="progressText">${text}</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>
  ` : `
    <div>${text}</div>
  `;

  document.body.appendChild(div);
}
function hideLoading() {
  document.getElementById("loading")?.remove();
}

function updateProgress(current,total){
  const percent = Math.floor((current/total)*100);
  document.getElementById("progressFill").style.width = percent+"%";
  document.getElementById("progressText").innerText =
    `🚀 ${current} / ${total} (${percent}%)`;
}

/* LOGIN */
async function login() {
  showLoading("Login...");

  const res = await fetch(API + "/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      account: acc.value,
      password: pass.value
    })
  });

  const json = await res.json();
  cookies = json.cookies;

  hideLoading();
  renderDashboard();
  loadTasks();
}

/* DASHBOARD */
function renderDashboard() {
  app.innerHTML = `
    <div class="header">
      <div>
        🚀 Auto Feedback | Total: <span id="total">0</span>
      </div>
      <button onclick="autoAll()">⚡ Auto All</button>
    </div>
    <div id="list" class="grid"></div>
  `;

  const list = document.getElementById("list");
  list.innerHTML = Array(6).fill().map(()=>`<div class="skeleton"></div>`).join("");
}

/* LOAD TASK */
async function loadTasks() {
  showLoading("Ambil data...");

  await fetch(API + "/api/tasks", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ cookies })
  });

  const res = await fetch(API + "/api/tasks/result");
  const json = await res.json();

  tasks = json.data || [];
  document.getElementById("total").innerText = json.total;

  renderList();
  hideLoading();
}

/* RENDER */
function renderList() {
  const list = document.getElementById("list");

  list.innerHTML = tasks.map(t => `
    <div class="card">
      <div style="font-weight:700">${t.userName}</div>
      <div style="opacity:.6;font-size:12px">${t.phoneNumber}</div>

      <div style="margin:10px 0;height:1px;background:#1f2937"></div>

      💰 <b>${t.formatDebt}</b><br>
      📍 ${t.addressBo?.city || "-"}

      <div style="margin-top:10px">
        <span class="badge ${t.feedbackStatus==='SUDAH'?'green':'red'}">
          ${t.feedbackStatus}
        </span>
      </div>

      <div style="margin-top:12px">
        <button onclick="autoOne('${t.id}')">⚡ Eksekusi</button>
      </div>
    </div>
  `).join("");
}

/* AUTO ONE */
async function autoOne(id) {
  await fetch(API + "/api/feedback", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ cookies, taskId:id })
  });

  alert("Done 1");
}

/* AUTO ALL (WITH PROGRESS UI) */
async function autoAll() {
  showLoading("Mulai...", true);

  let current = 0;
  const total = tasks.length;

  for (let t of tasks) {
    await fetch(API + "/api/auto", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ cookies, taskId:t.id })
    });

    current++;
    updateProgress(current,total);
  }

  hideLoading();
  alert("Semua selesai 🔥");
}

renderLogin();
</script>

</body>
</html>
