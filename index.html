<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
}

/* HEADER */
.header {
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
}

/* CARD */
.card {
  background:#0f172a;
  padding:15px;
  border-radius:12px;
}

/* GRID */
.grid {
  display:grid;
  gap:10px;
  padding:10px;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
}

/* BUTTON */
button {
  background:#3b82f6;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* LOGIN */
.login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:#0f172a;
  padding:20px;
  border-radius:12px;
}
input {
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PROGRESS */
.progress {
  width:300px;
}
.bar {
  height:10px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}
.fill {
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

/* LOGIN */
function renderLogin(){
  app.innerHTML = `
  <div class="login">
    <div class="login-box">
      <h2>Login</h2>
      <input id="acc" placeholder="No HP">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>`;
}

/* LOADING */
function show(text,progress=false){
  const d=document.createElement("div");
  d.className="modal";
  d.id="m";

  d.innerHTML = progress ? `
    <div class="progress">
      <div id="txt">${text}</div>
      <div class="bar"><div id="fill" class="fill"></div></div>
    </div>` : text;

  document.body.appendChild(d);
}
function hide(){ document.getElementById("m")?.remove(); }

function update(i,t){
  const p=Math.floor(i/t*100);
  fill.style.width=p+"%";
  txt.innerText=i+"/"+t+" ("+p+"%)";
}

/* LOGIN */
async function login(){
  show("login...");

  await fetch(API+"/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      account:acc.value,
      password:pass.value
    }),
    credentials:"include"
  });

  hide();
  renderDash();
  load();
}

/* DASH */
function renderDash(){
  app.innerHTML=`
    <div class="header">
      <div>Total: <span id="total">0</span></div>
      <button onclick="autoAll()">Auto All</button>
    </div>
    <div id="list" class="grid"></div>
  `;
}

/* LOAD */
async function load(){
  show("ambil data...");

  await fetch(API+"/api/tasks",{
    method:"POST",
    credentials:"include"
  });

  const r=await fetch(API+"/api/tasks/result",{credentials:"include"});
  const j=await r.json();

  total.innerText=j.total;

  list.innerHTML=j.data.map(x=>`
    <div class="card">
      <b>${x.userName}</b><br>
      ${x.formatDebt}<br>
      ${x.feedbackStatus}<br><br>
      <button onclick="one('${x.id}')">Run</button>
    </div>
  `).join("");

  hide();
}

/* AUTO 1 */
async function one(id){
  await fetch(API+"/api/feedback",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({taskId:id}),
    credentials:"include"
  });

  alert("done");
}

/* AUTO ALL (PROGRESS) */
async function autoAll(){
  const r=await fetch(API+"/api/tasks/result",{credentials:"include"});
  const j=await r.json();
  const tasks=j.data;

  show("start...",true);

  let i=0;

  for(let t of tasks){
    await fetch(API+"/api/feedback",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({taskId:t.id}),
      credentials:"include"
    });

    i++;
    update(i,tasks.length);
  }

  hide();
  alert("selesai 🔥");
}

renderLogin();
</script>

</body>
</html>
