<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Feedback PRO</title>

<style>
body { margin:0; font-family:sans-serif; background:#0f172a; color:#fff }
.header { padding:15px; background:#1e293b; display:flex; justify-content:space-between }
.card { background:#1e293b; margin:10px; padding:10px; border-radius:10px }
img { width:100%; border-radius:10px }
button { padding:8px 12px; margin:5px }
</style>
</head>

<body>

<div id="app"></div>

<script>
const API="https://auto-feedback-backend.onrender.com";

let accounts = JSON.parse(localStorage.getItem("accs")||"[]");
let userId=null;
let tasks=[];

function saveAcc(id){
  if(!accounts.includes(id)){
    accounts.push(id);
    localStorage.setItem("accs",JSON.stringify(accounts));
  }
}

function renderLogin(){
  app.innerHTML=`
  <h2>Login</h2>
  <input id="acc"><br><br>
  <input id="pass" type="password"><br><br>
  <button onclick="login()">Login</button>

  <h3>Multi Akun</h3>
  ${accounts.map(a=>`<button onclick="switchAcc('${a}')">${a}</button>`).join("")}
  `;
}

async function login(){
  app.innerHTML="🔄 login...";

  const res=await fetch(API+"/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      account:acc.value,
      password:pass.value
    })
  });

  const j=await res.json();

  if(!j.success) return alert("gagal");

  userId=j.userId;
  saveAcc(userId);

  load();
}

function switchAcc(id){
  userId=id;
  load();
}

async function load(){
  app.innerHTML="📥 ambil data...";

  await fetch(API+"/api/tasks",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  const int=setInterval(async ()=>{
    const p=await fetch(API+"/api/progress?userId="+userId);
    const prog=await p.json();

    app.innerHTML=`⏳ ${prog.done}/${prog.total}`;

    if(prog.done===prog.total && prog.total>0){
      clearInterval(int);

      const r=await fetch(API+"/api/tasks/result?userId="+userId);
      tasks=await r.json();

      render();
    }

  },1000);
}

function render(){
  app.innerHTML=`
  <div class="header">
    <div>Total ${tasks.length}</div>
    <div>
      <button onclick="auto()">AUTO</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div>
    ${tasks.map(t=>`
      <div class="card">
        <img src="${t.photo}">
        <b>${t.name}</b><br>
        📞 ${t.phoneNumber || "-"}<br>
        ⏳ ${t.sisa} hari
      </div>
    `).join("")}
  </div>
  `;
}

async function auto(){
  await fetch(API+"/api/auto",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });
  alert("🔥 selesai");
}

async function logout(){
  await fetch(API+"/api/logout",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  renderLogin();
}

renderLogin();
</script>

</body>
</html>
