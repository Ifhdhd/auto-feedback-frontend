<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Feedback Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  justify-content: space-between;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* BUTTON */
button {
  background: #3b82f6;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
button:hover { background: #2563eb; }

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

/* LOADING MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
}

/* STATUS */
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
.green { background:#16a34a; }
.red { background:#dc2626; }

/* SKELETON */
.skeleton {
  height:120px;
  background: linear-gradient(90deg,#1e293b,#334155,#1e293b);
  animation: shimmer 1.2s infinite;
  border-radius:12px;
}
@keyframes shimmer {
  0%{background-position:-200px 0}
  100%{background-position:200px 0}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://auto-feedback-backend.onrender.com";

let cookies = [];
let tasks = [];

function renderLogin() {
  app.innerHTML = `
  <div class="login">
    <div class="login-box">
      <h2>Login</h2>
      <input id="acc" placeholder="No HP">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>`;
}

function showLoading(text="Loading...") {
  const div = document.createElement("div");
  div.className = "modal";
  div.id = "loading";
  div.innerHTML = text;
  document.body.appendChild(div);
}
function hideLoading() {
  document.getElementById("loading")?.remove();
}

async function login() {
  showLoading("Login...");
  const res = await fetch(API + "/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      account: acc.value,
      password: pass.value
    })
  });

  const json = await res.json();
  cookies = json.cookies;

  hideLoading();
  renderDashboard();

  loadTasks(); // AUTO LOAD 🔥
}

function renderDashboard() {
  app.innerHTML = `
    <div class="header">
      <div>Total: <span id="total">0</span></div>
      <button onclick="autoAll()">Auto Feedback ALL</button>
    </div>

    <div id="list" class="grid"></div>
  `;

  // skeleton dulu
  const list = document.getElementById("list");
  list.innerHTML = Array(6).fill().map(()=>`<div class="skeleton"></div>`).join("");
}

async function loadTasks() {
  showLoading("Ambil data...");

  await fetch(API + "/api/tasks", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ cookies })
  });

  const res = await fetch(API + "/api/tasks/result");
  const json = await res.json();

  tasks = json.data || [];
  document.getElementById("total").innerText = json.total;

  renderList();

  hideLoading();
}

function renderList() {
  const list = document.getElementById("list");

  list.innerHTML = tasks.map(t => `
    <div class="card">
      <b>${t.userName}</b><br>
      ${t.phoneNumber}<br><br>

      💰 ${t.formatDebt}<br>
      📍 ${t.addressBo?.city}<br><br>

      <span class="badge ${t.feedbackStatus==='SUDAH'?'green':'red'}">
        ${t.feedbackStatus}
      </span>

      <br><br>
      <button onclick="autoOne('${t.id}')">Auto Feedback</button>
    </div>
  `).join("");
}

async function autoOne(id) {
  await fetch(API + "/api/feedback", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ cookies, taskId:id })
  });

  alert("Done 1");
}

async function autoAll() {
  showLoading("Auto feedback berjalan...");

  for (let t of tasks) {
    await fetch(API + "/api/feedback", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ cookies, taskId:t.id })
    });
  }

  hideLoading();
  alert("Semua selesai 🔥");
}

renderLogin();
</script>

</body>
</html>
