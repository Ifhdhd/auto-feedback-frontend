<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Feedback Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🚀 Auto Feedback</h1>

  <!-- LOGIN -->
  <div class="card">
    <h2>Login</h2>
    <input id="account" placeholder="Nomor HP">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ACTION -->
  <div class="card">
    <h2>Control</h2>
    <button onclick="loadTasks()">🔄 Load Data</button>
    <button onclick="autoFeedback()">⚡ Auto Feedback</button>
  </div>

  <!-- SUMMARY -->
  <div id="summary" class="summary"></div>

  <!-- DATA -->
  <div id="list" class="list"></div>

</div>

<script src="script.js"></script>
</body>
</html>
